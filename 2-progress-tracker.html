<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Tracker | RDHCoaching</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #5271FF;
            --purple: #C46BE4;
            --gold: #AB8B00;
            --dark: #09090E;
            --card: #15151E;
            --text: #FDFDFD;
            --muted: #BBBBD0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo {
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 3px;
            color: var(--blue);
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        h1 {
            font-size: clamp(32px, 8vw, 48px);
            font-weight: 800;
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--blue), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }

        .subtitle {
            font-size: clamp(16px, 4vw, 18px);
            color: var(--muted);
            max-width: 600px;
            margin: 0 auto;
        }

        .tracker-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .metric-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .metric-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--blue);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .metric-change {
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .metric-change.positive {
            background: rgba(171, 139, 0, 0.1);
            color: var(--gold);
        }

        .metric-change.negative {
            background: rgba(196, 107, 228, 0.1);
            color: var(--purple);
        }

        .metric-input-group {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
        }

        .metric-input {
            flex: 1;
            padding: 15px;
            background: var(--dark);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            color: var(--text);
            font-size: 24px;
            font-weight: 800;
            text-align: center;
            font-family: 'Inter', sans-serif;
        }

        .metric-input:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(82, 113, 255, 0.1);
        }

        .metric-unit {
            color: var(--muted);
            font-weight: 600;
            font-size: 14px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--blue), var(--purple));
            border: none;
            border-radius: 10px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(82, 113, 255, 0.3);
        }

        .history-list {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: var(--dark);
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .history-date {
            color: var(--muted);
        }

        .history-value {
            color: var(--text);
            font-weight: 600;
        }

        .chart-card {
            background: var(--card);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 30px;
        }

        .chart-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--text);
        }

        .chart-container {
            height: 300px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            gap: 8px;
        }

        .bar-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .bar {
            width: 100%;
            background: linear-gradient(180deg, var(--blue), var(--purple));
            border-radius: 8px 8px 0 0;
            transition: all 0.3s ease;
            position: relative;
            min-height: 20px;
        }

        .bar:hover {
            transform: scaleY(1.05);
            filter: brightness(1.2);
        }

        .bar-value {
            font-size: 11px;
            color: var(--text);
            font-weight: 700;
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
        }

        .bar-label {
            font-size: 11px;
            color: var(--muted);
            text-align: center;
        }

        .export-section {
            background: var(--card);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
        }

        .export-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text);
        }

        .export-text {
            color: var(--muted);
            margin-bottom: 25px;
        }

        .btn-secondary {
            display: inline-block;
            padding: 12px 30px;
            background: var(--dark);
            border: 1px solid var(--blue);
            border-radius: 10px;
            color: var(--blue);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 14px;
            margin: 5px;
            font-family: 'Inter', sans-serif;
        }

        .btn-secondary:hover {
            background: rgba(82, 113, 255, 0.1);
        }

        @media (max-width: 768px) {
            .tracker-grid {
                grid-template-columns: 1fr;
            }
        }

        .history-list::-webkit-scrollbar {
            width: 6px;
        }

        .history-list::-webkit-scrollbar-track {
            background: var(--dark);
            border-radius: 10px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: var(--blue);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">RDHCoaching</div>
            <h1>Progress Tracker</h1>
            <p class="subtitle">Track your transformation week by week. What gets measured gets managed.</p>
        </div>

        <div class="tracker-grid">
            <div class="card">
                <div class="metric-header">
                    <span class="metric-label">Bodyweight</span>
                    <span class="metric-change" id="weightChange">--</span>
                </div>
                <div class="metric-input-group">
                    <input type="number" class="metric-input" id="weightInput" placeholder="0.0" step="0.1">
                    <span class="metric-unit">kg</span>
                </div>
                <button class="btn" onclick="addMetric('weight')">Add Entry</button>
                <div class="history-list" id="weightHistory"></div>
            </div>

            <div class="card">
                <div class="metric-header">
                    <span class="metric-label">Waist</span>
                    <span class="metric-change" id="waistChange">--</span>
                </div>
                <div class="metric-input-group">
                    <input type="number" class="metric-input" id="waistInput" placeholder="0.0" step="0.1">
                    <span class="metric-unit">cm</span>
                </div>
                <button class="btn" onclick="addMetric('waist')">Add Entry</button>
                <div class="history-list" id="waistHistory"></div>
            </div>

            <div class="card">
                <div class="metric-header">
                    <span class="metric-label">Squat</span>
                    <span class="metric-change" id="squatChange">--</span>
                </div>
                <div class="metric-input-group">
                    <input type="number" class="metric-input" id="squatInput" placeholder="0.0" step="2.5">
                    <span class="metric-unit">kg</span>
                </div>
                <button class="btn" onclick="addMetric('squat')">Add Entry</button>
                <div class="history-list" id="squatHistory"></div>
            </div>

            <div class="card">
                <div class="metric-header">
                    <span class="metric-label">Bench Press</span>
                    <span class="metric-change" id="benchChange">--</span>
                </div>
                <div class="metric-input-group">
                    <input type="number" class="metric-input" id="benchInput" placeholder="0.0" step="2.5">
                    <span class="metric-unit">kg</span>
                </div>
                <button class="btn" onclick="addMetric('bench')">Add Entry</button>
                <div class="history-list" id="benchHistory"></div>
            </div>

            <div class="card">
                <div class="metric-header">
                    <span class="metric-label">Deadlift</span>
                    <span class="metric-change" id="deadliftChange">--</span>
                </div>
                <div class="metric-input-group">
                    <input type="number" class="metric-input" id="deadliftInput" placeholder="0.0" step="2.5">
                    <span class="metric-unit">kg</span>
                </div>
                <button class="btn" onclick="addMetric('deadlift')">Add Entry</button>
                <div class="history-list" id="deadliftHistory"></div>
            </div>

            <div class="card">
                <div class="metric-header">
                    <span class="metric-label">Energy Level</span>
                    <span class="metric-change" id="energyChange">--</span>
                </div>
                <div class="metric-input-group">
                    <input type="number" class="metric-input" id="energyInput" placeholder="0" min="1" max="10" step="1">
                    <span class="metric-unit">/10</span>
                </div>
                <button class="btn" onclick="addMetric('energy')">Add Entry</button>
                <div class="history-list" id="energyHistory"></div>
            </div>
        </div>

        <div class="chart-card">
            <h2 class="chart-title">Bodyweight Trend</h2>
            <div class="chart-container" id="weightChart"></div>
        </div>

        <div class="export-section">
            <h3 class="export-title">Export Your Data</h3>
            <p class="export-text">Download your progress for review or coaching analysis</p>
            <button class="btn-secondary" onclick="exportData()">Download CSV</button>
            <button class="btn-secondary" onclick="clearData()">Reset All Data</button>
        </div>
    </div>

    <script>
        let trackerData = JSON.parse(localStorage.getItem('rdhTracker')) || {
            weight: [],
            waist: [],
            squat: [],
            bench: [],
            deadlift: [],
            energy: []
        };

        window.onload = function() {
            updateAllDisplays();
        };

        function addMetric(type) {
            const input = document.getElementById(`${type}Input`);
            const value = parseFloat(input.value);

            if (!value || value <= 0) {
                alert('Please enter a valid value');
                return;
            }

            const entry = {
                date: new Date().toISOString(),
                value: value
            };

            trackerData[type].push(entry);
            localStorage.setItem('rdhTracker', JSON.stringify(trackerData));

            input.value = '';
            updateDisplay(type);
            updateChart();
        }

        function updateDisplay(type) {
            const history = trackerData[type];
            const historyContainer = document.getElementById(`${type}History`);
            const changeElement = document.getElementById(`${type}Change`);

            historyContainer.innerHTML = '';
            const recentEntries = history.slice(-5).reverse();
            
            recentEntries.forEach(entry => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <span class="history-date">${new Date(entry.date).toLocaleDateString()}</span>
                    <span class="history-value">${entry.value}</span>
                `;
                historyContainer.appendChild(div);
            });

            if (history.length >= 2) {
                const latest = history[history.length - 1].value;
                const previous = history[history.length - 2].value;
                const change = latest - previous;
                const changePercent = ((change / previous) * 100).toFixed(1);
                
                changeElement.textContent = `${change > 0 ? '+' : ''}${change.toFixed(1)} (${changePercent}%)`;
                changeElement.className = 'metric-change ' + (change > 0 ? 'positive' : 'negative');
            } else {
                changeElement.textContent = '--';
                changeElement.className = 'metric-change';
            }
        }

        function updateAllDisplays() {
            Object.keys(trackerData).forEach(type => {
                updateDisplay(type);
            });
            updateChart();
        }

        function updateChart() {
            const chartContainer = document.getElementById('weightChart');
            const weightData = trackerData.weight.slice(-10);

            chartContainer.innerHTML = '';

            if (weightData.length === 0) {
                chartContainer.innerHTML = '<p style="text-align: center; color: var(--muted); margin: auto;">Add weight entries to see your trend</p>';
                return;
            }

            const maxWeight = Math.max(...weightData.map(d => d.value));
            const minWeight = Math.min(...weightData.map(d => d.value));
            const range = maxWeight - minWeight || 1;

            weightData.forEach(entry => {
                const barWrapper = document.createElement('div');
                barWrapper.className = 'bar-wrapper';

                const bar = document.createElement('div');
                bar.className = 'bar';
                const height = ((entry.value - minWeight) / range) * 80 + 20;
                bar.style.height = `${height}%`;

                const value = document.createElement('div');
                value.className = 'bar-value';
                value.textContent = `${entry.value}kg`;
                bar.appendChild(value);

                const label = document.createElement('div');
                label.className = 'bar-label';
                const date = new Date(entry.date);
                label.textContent = `${date.getDate()}/${date.getMonth() + 1}`;

                barWrapper.appendChild(bar);
                barWrapper.appendChild(label);
                chartContainer.appendChild(barWrapper);
            });
        }

        function exportData() {
            let csv = 'Date,Bodyweight (kg),Waist (cm),Squat (kg),Bench (kg),Deadlift (kg),Energy (/10)\n';

            const allDates = new Set();
            Object.values(trackerData).forEach(entries => {
                entries.forEach(entry => allDates.add(entry.date));
            });

            const sortedDates = Array.from(allDates).sort();

            sortedDates.forEach(date => {
                const row = [new Date(date).toLocaleDateString()];
                
                ['weight', 'waist', 'squat', 'bench', 'deadlift', 'energy'].forEach(type => {
                    const entry = trackerData[type].find(e => e.date === date);
                    row.push(entry ? entry.value : '');
                });

                csv += row.join(',') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `rdh-progress-${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
        }

        function clearData() {
            if (confirm('Are you sure you want to delete all your progress data? This cannot be undone.')) {
                localStorage.removeItem('rdhTracker');
                trackerData = {
                    weight: [],
                    waist: [],
                    squat: [],
                    bench: [],
                    deadlift: [],
                    energy: []
                };
                updateAllDisplays();
            }
        }
    </script>
</body>
</html>
