<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RDH World Cup Draw | Admin Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --blue: #5271FF;
    --purple: #C46BE4;
    --gold: #AB8B00;
    --gold-bright: #FFCC33;
    --ink: #07070D;
    --ink-2: #0E0E1A;
    --paper: #F4F4FA;
    --muted: rgba(244,244,250,0.55);
    --line: rgba(244,244,250,0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Archivo', sans-serif;
    background: var(--ink);
    color: var(--paper);
    min-height: 100dvh;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(900px 600px at 12% -10%, rgba(82,113,255,0.30), transparent 60%),
      radial-gradient(800px 600px at 95% 0%, rgba(196,107,228,0.26), transparent 55%),
      radial-gradient(700px 700px at 50% 120%, rgba(171,139,0,0.16), transparent 60%),
      var(--ink);
  }
  .bg .pitch {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(244,244,250,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(244,244,250,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(circle at 50% 35%, black, transparent 75%);
  }

  .wrap {
    position: relative; z-index: 2; flex: 1;
    width: 100%; max-width: 720px; margin: 0 auto;
    padding: 30px 20px 60px;
  }

  .brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 900; letter-spacing: 0.02em;
    font-size: 0.82rem; text-transform: uppercase;
  }
  .brand .dot {
    width: 28px; height: 28px; border-radius: 8px;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    display: grid; place-items: center;
    font-family: 'Anton'; font-size: 0.9rem;
    box-shadow: 0 6px 20px rgba(82,113,255,0.4);
  }
  .brand .tag { color: var(--muted); font-weight: 600; }
  .admintag {
    margin-left: auto;
    font-size: 0.64rem; font-weight: 800; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--gold-bright);
    border: 1px solid rgba(255,204,51,0.3); border-radius: 100px;
    padding: 5px 11px; background: rgba(255,204,51,0.06);
  }

  h1 {
    font-family: 'Anton', sans-serif; font-weight: 400;
    font-size: clamp(2.2rem, 8vw, 3.2rem); line-height: 0.95;
    text-transform: uppercase; margin-top: 26px; letter-spacing: -0.01em;
  }
  h1 .grad {
    background: linear-gradient(100deg, var(--blue), var(--purple) 55%, var(--gold-bright));
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .lede { margin-top: 12px; color: rgba(244,244,250,0.72); font-size: 0.98rem; line-height: 1.5; max-width: 54ch; }

  .card {
    margin-top: 24px; border: 1px solid var(--line); border-radius: 20px;
    padding: 22px; background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015));
  }

  label { display:block; font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 8px; }

  textarea {
    width: 100%; min-height: 150px; resize: vertical;
    padding: 14px 15px; border-radius: 12px; border: 1px solid var(--line);
    background: rgba(7,7,13,0.6); color: var(--paper);
    font-family: 'Archivo'; font-size: 1rem; font-weight: 600; line-height: 1.6;
  }
  textarea:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(82,113,255,0.22); }
  textarea::placeholder { color: rgba(244,244,250,0.3); font-weight: 500; }

  .opts { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 10px 20px; align-items: center; }
  .toggle { display: flex; align-items: center; gap: 9px; cursor: pointer; font-size: 0.88rem; font-weight: 600; }
  .toggle input { display: none; }
  .toggle .box {
    width: 44px; height: 26px; border-radius: 100px; background: rgba(255,255,255,0.1);
    border: 1px solid var(--line); position: relative; transition: background 0.2s;
    flex: none;
  }
  .toggle .box::after {
    content: ""; position: absolute; top: 2px; left: 2px;
    width: 20px; height: 20px; border-radius: 50%; background: var(--paper);
    transition: transform 0.2s;
  }
  .toggle input:checked + .box { background: linear-gradient(100deg, var(--blue), var(--purple)); }
  .toggle input:checked + .box::after { transform: translateX(18px); }
  .toggle .hint { color: var(--muted); font-size: 0.78rem; font-weight: 500; }

  .count { margin-top: 14px; font-size: 0.82rem; color: var(--muted); font-weight: 600; }
  .count b { color: var(--gold-bright); }
  .err { color: #ff8a8a; font-size: 0.82rem; font-weight: 600; margin-top: 10px; min-height: 1em; }

  .btn {
    margin-top: 16px; width: 100%; border: none; cursor: pointer; padding: 17px;
    border-radius: 14px; font-family: 'Anton', sans-serif; font-size: 1.3rem;
    letter-spacing: 0.04em; text-transform: uppercase; color: #0a0a12;
    background: linear-gradient(100deg, var(--gold-bright), #ffd86b);
    box-shadow: 0 14px 36px -12px rgba(255,204,51,0.6);
    transition: transform 0.12s, box-shadow 0.2s, opacity 0.2s;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: translateY(0); }
  .btn.secondary {
    background: rgba(255,255,255,0.05); color: var(--paper);
    border: 1px solid var(--line); box-shadow: none; font-size: 1.05rem;
  }
  .btn.secondary:hover { background: rgba(255,255,255,0.09); border-color: var(--purple); }

  .btnrow { display: flex; gap: 12px; margin-top: 16px; }
  .btnrow .btn { margin-top: 0; }

  /* Draw stage */
  .stage { margin-top: 24px; display: none; }
  .stage.show { display: block; }

  .nowdrawing {
    border: 1px solid var(--line); border-radius: 18px; padding: 24px; text-align: center;
    background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
    overflow: hidden; position: relative;
  }
  .nowdrawing .who { font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.16em; color: var(--gold-bright); font-weight: 800; }
  .nowdrawing .person { font-family: 'Anton'; font-size: 1.8rem; margin-top: 6px; text-transform: uppercase; }
  .nowdrawing .flag { font-size: 4.4rem; line-height: 1; margin: 14px 0 4px; }
  .nowdrawing .team { font-family: 'Anton'; font-size: 1.4rem; text-transform: uppercase; color: rgba(244,244,250,0.9); }
  .nowdrawing.rolling .flag { animation: shake 0.18s linear infinite; }
  @keyframes shake { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

  /* Results board */
  .board { margin-top: 22px; display: none; }
  .board.show { display: block; }
  .boardhead { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; }
  .boardhead h2 { font-family: 'Anton'; font-size: 1.5rem; text-transform: uppercase; }
  .boardhead .sub { color: var(--muted); font-size: 0.8rem; font-weight: 600; }

  .row {
    display: flex; align-items: center; gap: 14px;
    padding: 13px 15px; border: 1px solid var(--line); border-radius: 13px;
    margin-bottom: 9px; background: rgba(255,255,255,0.02);
    animation: slidein 0.4s ease both;
  }
  @keyframes slidein { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1; transform: none; } }
  .row .num { font-family: 'Anton'; font-size: 1rem; color: var(--muted); width: 26px; flex: none; }
  .row .rflag { font-size: 2rem; line-height: 1; flex: none; }
  .fimg { display:inline-block; border-radius:4px; box-shadow:0 2px 8px rgba(0,0,0,0.4); vertical-align:middle; }
  .nowdrawing .flag .fimg { height:64px; border-radius:6px; }
  .row .rflag .fimg { height:30px; }
  .reel .flag .fimg, .result .bigflag .fimg { height:74px; border-radius:7px; }
  .row .info { flex: 1; min-width: 0; }
  .row .rperson { font-weight: 800; font-size: 1.02rem; }
  .row .rteam { color: var(--muted); font-size: 0.84rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }

  .actions { margin-top: 18px; display: flex; gap: 12px; flex-wrap: wrap; }
  .actions .btn { margin-top: 0; flex: 1; min-width: 160px; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--ink-2); border: 1px solid var(--line); color: var(--paper);
    padding: 13px 20px; border-radius: 12px; font-weight: 700; font-size: 0.9rem;
    opacity: 0; transition: all 0.3s; z-index: 20; box-shadow: 0 20px 50px -20px black;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  footer { position: relative; z-index: 2; text-align: center; padding: 22px; font-size: 0.72rem; color: rgba(244,244,250,0.35); font-weight: 600; }

  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.001s !important; } }
</style>
</head>

  <div class="wrap">

      <span class="admintag">Admin only</span>
    </div>

    <h1>The <span class="grad">Draw</span>.</h1>

      <div class="opts">
        <label class="toggle" style="margin:0;">
          <input type="checkbox" id="unique" />
          <span class="box"></span>
          <span>Unique teams<span class="hint"> (no repeats, max 48)</span></span>

        <label class="toggle" style="margin:0;">

          <span class="box"></span>
          <span>Dramatic reveal<span class="hint"> (one at a time)</span></span>

      </div>

      <div class="count" id="count">0 names ready</div>
      <div class="err" id="err"></div>

      <button class="btn" id="draw">Run the draw ⚽</button>
    </div>

    <!-- dramatic single reveal -->
    <div class="stage" id="stage">
      <div class="nowdrawing" id="nowdrawing">
        <div class="who">Drawing for</div>
        <div class="person" id="curPerson">—</div>
        <div class="flag" id="curFlag">⚽</div>
        <div class="team" id="curTeam">—</div>
      </div>
      <div class="btnrow">
        <button class="btn secondary" id="skip">Skip to results</button>
        <button class="btn" id="nextDraw">Next ⚽</button>
      </div>
    </div>

    <!-- results board -->
    <div class="board" id="board">
      <div class="boardhead">
        <h2>The teams are in</h2>
        <div class="sub" id="boardSub"></div>
      </div>
      <div id="rows"></div>
      <div class="actions">
        <button class="btn" id="sheetBtn">Copy for sheet</button>
        <button class="btn secondary" id="copyBtn">Copy as text</button>
        <button class="btn secondary" id="againBtn">New draw</button>
      </div>
    </div>
  </div>

  <footer>RDH Coaching · World Cup 2026 · Admin draw tool</footer>
  <div class="toast" id="toast"></div>

  function flagImg(code, px){
    const src = FLAG_PNG[code];
    if(!src) return '<span>⚽</span>';
    return '<img class="fimg" src="'+src+'" alt="" />';
  }

  const $ = id => document.getElementById(id);
  let queue = [];      // [{name}]
  let results = [];    // [{name, team, flag}]
  let pool = [];       // working team pool
  let idx = 0;

  function parseNames() {
    return $("names").value.split("\n").map(s => s.trim()).filter(Boolean);
  }
  function updateCount() {
    const n = parseNames().length;
    $("count").innerHTML = "<b>" + n + "</b> name" + (n===1?"":"s") + " ready";
  }
  $("names").addEventListener("input", updateCount);

  function shuffle(a) {
    const arr = a.slice();
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function pickTeam(unique) {
    if (unique) {
      if (pool.length === 0) return null;
      return pool.pop();
    }
    return TEAMS[Math.floor(Math.random() * TEAMS.length)];
  }

  function toast(msg) {
    const t = $("toast"); t.textContent = msg; t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 1800);
  }

  $("draw").addEventListener("click", () => {
    const names = parseNames();
    $("err").textContent = "";
    if (names.length === 0) { $("err").textContent = "Paste at least one name."; return; }

    const unique = $("unique").checked;
    if (unique && names.length > TEAMS.length) {
      $("err").textContent = "Unique mode caps at 48 teams. You have " + names.length + " names. Turn off unique teams or trim the list.";
      return;
    }

    queue = shuffle(names).map(n => ({ name: n }));
    pool = shuffle(TEAMS);
    results = [];
    idx = 0;

    $("inputCard").style.display = "none";

    if ($("dramatic").checked) {
      $("stage").classList.add("show");
      drawOne();
    } else {
      // instant: assign all, show board
      queue.forEach(q => {
        const t = pickTeam(unique);
        results.push({ name: q.name, team: t[0], flag: t[1], code: t[2] });
      });
      renderBoard();
    }
  });

  function drawOne() {
    if (idx >= queue.length) { renderBoard(); return; }
    const person = queue[idx];
    $("curPerson").textContent = person.name;
    $("nowdrawing").classList.add("rolling");
    $("nextDraw").disabled = true;

    const unique = $("unique").checked;
    const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const final = pickTeam(unique);

    if (reduce) {
      $("curFlag").innerHTML = flagImg(final[2], 64);
      $("curTeam").textContent = final[0];
      $("nowdrawing").classList.remove("rolling");
      results.push({ name: person.name, team: final[0], flag: final[1], code: final[2] });
      idx++;
      $("nextDraw").disabled = false;
      if (idx >= queue.length) $("nextDraw").textContent = "See the board ⚽";
      return;
    }

    let ticks = 0;
    const spin = setInterval(() => {
      const r = TEAMS[Math.floor(Math.random()*TEAMS.length)];
      $("curFlag").innerHTML = flagImg(r[2], 64);
      $("curTeam").textContent = r[0];
      ticks++;
      if (ticks > 16) {
        clearInterval(spin);
        $("curFlag").innerHTML = flagImg(final[2], 64);
        $("curTeam").textContent = final[0];
        $("nowdrawing").classList.remove("rolling");
        results.push({ name: person.name, team: final[0], flag: final[1], code: final[2] });
        idx++;
        $("nextDraw").disabled = false;
        if (idx >= queue.length) $("nextDraw").textContent = "See the board ⚽";
      }
    }, 80);
  }

  $("nextDraw").addEventListener("click", drawOne);

  $("skip").addEventListener("click", () => {
    const unique = $("unique").checked;
    while (idx < queue.length) {
      const t = pickTeam(unique);
      results.push({ name: queue[idx].name, team: t[0], flag: t[1], code: t[2] });
      idx++;
    }
    renderBoard();
  });

  function codeFor(r){
    if (r.code) return r.code;
    const t = TEAMS.find(x => x[0] === r.team);
    return t ? t[2] : "";
  }

  function renderBoard() {
    $("stage").classList.remove("show");
    $("board").classList.add("show");
    $("boardSub").textContent = results.length + " drawn · " + ($("unique").checked ? "unique teams" : "repeats allowed");
    const rows = $("rows");
    rows.innerHTML = "";
    results.forEach((r, i) => {
      const div = document.createElement("div");
      div.className = "row";
      div.style.animationDelay = (i * 0.04) + "s";
      div.innerHTML =
        '<div class="num">' + (i+1) + '</div>' +
        '<div class="rflag">' + flagImg(codeFor(r), 30) + '</div>' +
        '<div class="info"><div class="rperson"></div><div class="rteam"></div></div>';
      div.querySelector(".rperson").textContent = r.name;
      div.querySelector(".rteam").textContent = r.team;
      rows.appendChild(div);
    });
    $("board").scrollIntoView({ behavior: "smooth", block: "start" });
  }

  $("copyBtn").addEventListener("click", () => {
    const txt = results.map(r => r.name + " → " + r.flag + " " + r.team).join("\n");
    if (navigator.clipboard) {
      navigator.clipboard.writeText(txt).then(() => toast("Copied to clipboard"));
    }
  });

  $("sheetBtn").addEventListener("click", () => {
    // Two columns: Team <TAB> Entrant, ready to paste into the tracker paste zone (H5)
    const txt = results.map(r => r.team + "\t" + r.name).join("\n");
    if (navigator.clipboard) {
      navigator.clipboard.writeText(txt).then(() => toast("Copied. Paste into cell H5 of the DRAW tab"));
    }
  });

  $("againBtn").addEventListener("click", () => {
    $("board").classList.remove("show");
    $("inputCard").style.display = "block";
    $("nextDraw").textContent = "Next ⚽";
    window.scrollTo({ top: 0, behavior: "smooth" });
  });

  updateCount();
</script>
</body>
</html>
